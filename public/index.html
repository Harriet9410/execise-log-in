<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题练习 - 登录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>📚 刷题练习</h1>
      <p>登录你的账号，开始练习</p>
    </div>
    <div class="login-tabs">
      <button class="tab-btn active" data-tab="login">登录</button>
      <button class="tab-btn" data-tab="register">注册</button>
    </div>
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <div id="loginError" class="form-error"></div>
      <button type="submit" class="btn-login">登 录</button>
    </form>
    <form id="registerForm" class="login-form" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="2-20个字符" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="至少4个字符" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regPassword2" placeholder="再次输入密码" required autocomplete="new-password">
      </div>
      <div id="regError" class="form-error"></div>
      <button type="submit" class="btn-login">注 册</button>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
